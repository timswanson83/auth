<!DOCTYPE html>
<html>
<head><title>Signing you in...</title>
<style>
  body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#07121f;color:#93c5fd;}
  p{font-size:16px;}
</style>
</head>
<body>
<p>✅ Signing you in...</p>
<script>
  if(location.hash && location.hash.includes('access_token')){
    const params = new URLSearchParams(location.hash.substring(1));
    const token = params.get('access_token');
    const state = params.get('state');
    if(token){
      localStorage.setItem('vtdb_tk', token);
      if(state){ location.href = decodeURIComponent(state) + '#vtdb_authed'; }
      else { document.querySelector('p').textContent = '✅ Signed in — you can close this tab and return to the app.'; }
    }
  } else {
    document.querySelector('p').textContent = 'No token found — please try signing in again.';
  }
</script>
</body>
</html>
