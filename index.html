<!DOCTYPE html>
<html>
<head><title>Signing you in...</title>
<style>
body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#1e3a6e;color:#93c5fd;}
p{font-size:16px;}
</style>
</head>
<body>
<p id="msg">Signing you in...</p>
<script>
  // Implicit flow — token arrives in hash, state contains return URL
  const hash = new URLSearchParams(location.hash.substring(1));
  const token = hash.get('access_token');
  const state = hash.get('state');
  if (token && state) {
    const appUrl = decodeURIComponent(state);
    location.href = appUrl + '#access_token=' + token + '&token_type=Bearer';
  } else {
    document.getElementById('msg').textContent = 'Sign-in failed — please try again.';
  }
</script>
</body>
</html>
