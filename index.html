<!DOCTYPE html>
<html>
<head><title>Signing you in...</title>
<style>
  body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#07121f;color:#93c5fd;}
  p{font-size:16px;}
</style>
</head>
<body>
<p>✅ Completing sign-in...</p>
<script>
  // PKCE flow — Microsoft returns a code and state via query params
  const params = new URLSearchParams(location.search);
  const code  = params.get('code');
  const state = params.get('state');
  if (code && state) {
    // Redirect back to the app with the code so it can exchange for a token
    const appUrl = decodeURIComponent(state);
    location.href = appUrl + '?code=' + encodeURIComponent(code) + '&state=' + encodeURIComponent(state);
  } else {
    document.querySelector('p').textContent = 'No auth code found — please try signing in again.';
  }
</script>
</body>
</html>
