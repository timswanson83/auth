<!DOCTYPE html>
<html>
<head><title>Signing you in...</title>
<style>
body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#1e3a6e;color:#93c5fd;}
p{font-size:16px;}
</style>
</head>
<body>
<p id="msg">Completing sign-in...</p>
<script>
const params = new URLSearchParams(location.search);
const code  = params.get('code');
const state = params.get('state');
const error = params.get('error');

if (error) {
  document.getElementById('msg').textContent = 'Sign-in error: ' + error;
} else if (code && state) {
  const appUrl = decodeURIComponent(state);
  location.href = appUrl + '?code=' + encodeURIComponent(code) + '&state=' + encodeURIComponent(state);
} else if (code) {
  // No state — redirect to app directly
  location.href = 'https://timswanson83.github.io/auth/vancouver-tech-db.html?code=' + encodeURIComponent(code);
} else {
  document.getElementById('msg').textContent = 'No auth code found — params: ' + location.search;
}
</script>
</body>
</html>
